# Production overrides — points at the GHCR-published image.
# Replace <OWNER> / host / secret handling with real values for your environment.

replicaCount: 3

image:
  # Published to GitHub Container Registry.
  repository: ghcr.io/mehraxn/kubeops
  tag: "latest" # pin to an immutable version/digest in real deployments
  pullPolicy: IfNotPresent

env:
  APP_ENV: production
  LOG_LEVEL: INFO

ingress:
  enabled: true
  className: nginx
  host: kubeops.example.com

# In production, provision the secret out-of-band and reference it by name
# instead of rendering a value into the chart.
secret:
  create: false
  existingSecret: kubeops-secret

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
