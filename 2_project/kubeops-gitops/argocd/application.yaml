# Argo CD Application for the KubeOps Helm chart.
#
# This manifest tells Argo CD WHAT to deploy and WHERE. It does NOT install
# Argo CD itself — you install Argo CD separately (see docs/gitops.md), then
# apply this file into the "argocd" namespace:
#
#     kubectl apply -f argocd/application.yaml
#
# Sync is MANUAL by default (safest for a portfolio/demo). Nothing is deployed
# until you click "Sync" in the Argo CD UI or run:
#
#     argocd app sync kubeops
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeops
  # The Application object itself lives in the argocd namespace (where Argo CD runs).
  namespace: argocd
spec:
  # "default" is the built-in Argo CD AppProject. Change only if you create your own.
  project: default

  source:
    # The Git repository Argo CD watches (this repo).
    repoURL: https://github.com/mehraxn/kubeops-gitops.git

    # Path INSIDE the repo that contains the Helm chart.
    path: helm/kubeops

    # Git branch, tag, or commit Argo CD tracks.
    targetRevision: main

    helm:
      # Value files are resolved relative to source.path (helm/kubeops).
      # Use values-dev.yaml for the dev environment; switch to values.yaml
      # or values-prod.yaml as needed.
      valueFiles:
        - values-dev.yaml

  destination:
    # In-cluster address — this is the cluster Argo CD itself runs in.
    server: https://kubernetes.default.svc
    # Namespace the chart's resources are deployed into.
    namespace: kubeops-dev

  # -------------------------------------------------------------------------
  # SYNC POLICY
  # -------------------------------------------------------------------------
  # MANUAL sync is active by default: the "automated:" block below is commented
  # out, so Argo CD will only report drift (OutOfSync) and wait for you to sync.
  #
  # syncOptions still apply to manual syncs, so CreateNamespace is kept active
  # to auto-create kubeops-dev on first sync.
  syncPolicy:
    syncOptions:
      # Create the destination namespace (kubeops-dev) if it does not exist.
      - CreateNamespace=true

    # -----------------------------------------------------------------------
    # HOW TO ENABLE AUTOMATED (CONTINUOUS) SYNC LATER:
    # Uncomment the "automated:" block below and re-apply this file
    # (kubectl apply -f argocd/application.yaml). After that, Argo CD will:
    #   - prune:    delete resources removed from Git
    #   - selfHeal: revert manual "kubectl edit" changes back to Git state
    # -----------------------------------------------------------------------
    # automated:
    #   prune: true
    #   selfHeal: true
