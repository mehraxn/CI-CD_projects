# EXAMPLE ONLY — do NOT commit real secrets.
# Copy this file to secret.yaml, replace the placeholder below with a real
# value, and keep secret.yaml out of version control (it is gitignored).
# Apply with: kubectl apply -f k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: kubeops-secret
  namespace: kubeops-dev
  labels:
    app: kubeops
type: Opaque
stringData:
  # PLACEHOLDER — replace before applying. Never store a real secret here.
  APP_SECRET_KEY: "replace-me-with-a-real-secret"
